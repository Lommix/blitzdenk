name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: macos-latest
            suffix: macos-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          cache-size-limit: 1024
      - run: zig build -Doptimize=ReleaseSmall
      - name: rename binary
        run: mv zig-out/bin/blitzdenk zig-out/bin/blitzdenk-${{ matrix.suffix }}
      - uses: softprops/action-gh-release@v2
        with:
          files: zig-out/bin/blitzdenk-*